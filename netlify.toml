  force = true

[[redirects]]
  from = "/reklamnye-roliki"
  to = "/uslugi/reklamnye-roliki"
  status = 301
  force = true

[[redirects]]
  from = "/korporativnye-filmy"
  to = "/uslugi/korporativnye-filmy"
  status = 301
  force = true

[[redirects]]
  from = "/smm"
  to = "/uslugi/smm-content-strategy"
  status = 301
  force = true

[[redirects]]
  from = "/3d-animaciya"
  to = "/uslugi/3d-motion-design"
  status = 301
  force = true

[[redirects]]
  from = "/motion-design"
  to = "/uslugi/3d-motion-design"
  status = 301
