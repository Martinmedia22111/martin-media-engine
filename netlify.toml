[[redirects]]
  from = "/portfolio"
  to = "/kejsy"
  status = 301
  force = true

[[redirects]]
  from = "/portfolio/*"
  to = "/kejsy"
  status = 301
  force = true

# SPA fallback (must be LAST!)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Enable prerendering for search engine bots (Netlify feature)
[build.processing]
  skip_processing = false

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Long cache for static assets
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
